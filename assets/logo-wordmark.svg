<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 256" width="960" height="256">
  <defs>
    <linearGradient id="helmetGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#7B2FBE"/>
    </linearGradient>
    <linearGradient id="visorGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="60%" stop-color="#0D1B2A"/>
    </linearGradient>
    <linearGradient id="wingGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#7B2FBE"/>
    </linearGradient>
    <linearGradient id="visorShine" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
  </defs>

  <!-- === ICON (scaled to fit 256x256 area on the left) === -->
  <g transform="translate(128, 128) scale(0.48) translate(-256, -256)">
    <!-- Helmet outer circle -->
    <circle cx="256" cy="256" r="200" fill="url(#helmetGrad)" stroke="#FFFFFF" stroke-width="8"/>

    <!-- Helmet inner ring -->
    <circle cx="256" cy="256" r="170" fill="none" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="3"/>

    <!-- Visor -->
    <rect x="136" y="176" rx="60" ry="60" width="240" height="160" fill="url(#visorGrad)" stroke="#FFFFFF" stroke-width="4"/>

    <!-- Visor reflection -->
    <ellipse cx="210" cy="230" rx="50" ry="30" fill="url(#visorShine)" transform="rotate(-15 210 230)"/>

    <!-- Star dots in visor -->
    <circle cx="310" cy="210" r="3" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="330" cy="240" r="2" fill="#FFFFFF" opacity="0.4"/>
    <circle cx="290" cy="290" r="2.5" fill="#FFFFFF" opacity="0.5"/>

    <!-- Flutter wing -->
    <g transform="translate(390, 180) rotate(15)">
      <path d="M0,0 L40,-20 L40,20 L0,40 Z" fill="url(#wingGrad)" opacity="0.9"/>
      <path d="M5,45 L45,25 L45,65 L5,85 Z" fill="#00D4FF" opacity="0.7"/>
      <path d="M10,90 L50,70 L50,110 L10,130 Z" fill="#7B2FBE" opacity="0.6"/>
    </g>

    <!-- Antenna -->
    <line x1="256" y1="56" x2="256" y2="30" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
    <circle cx="256" cy="24" r="8" fill="#00D4FF"/>
    <circle cx="256" cy="24" r="4" fill="#FFFFFF"/>
  </g>

  <!-- === WORDMARK === -->
  <text x="280" y="148" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="600" letter-spacing="1">
    <tspan fill="#FFFFFF">flutter</tspan><tspan fill="#00D4FF">naut</tspan>
  </text>

  <!-- Subtle tagline -->
  <text x="282" y="182" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="300" fill="#FFFFFF" opacity="0.5" letter-spacing="3">
    SEMANTIC TEST AUTOMATION
  </text>
</svg>
